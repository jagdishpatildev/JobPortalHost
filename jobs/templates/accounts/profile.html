{% extends 'base.html' %}
{% block title %}Upload Resume - HireHub{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4">
                        <i class="fas fa-upload me-2 text-primary"></i>Upload Resume
                    </h3>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Resume Title</label>
                            <input type="text" name="title" class="form-control"
                                   placeholder="e.g. My Software Engineer Resume" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Resume File (PDF)</label>
                            <input type="file" name="file" class="form-control" accept=".pdf,.doc,.docx" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-upload me-1"></i>Upload Resume
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
