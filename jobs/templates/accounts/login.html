{% extends 'base.html' %}
{% block title %}Login — HireHub{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <i class="fas fa-briefcase fa-2x" style="color:var(--blue)"></i>
        <h2 class="mt-2 mb-0" style="font-family:'Sora',sans-serif;font-weight:800">Welcome back</h2>
        <p class="text-muted">Sign in to your HireHub account</p>
      </div>
      <div class="card border-0 shadow">
        <div class="card-body p-4">
          {% if form.errors %}
          <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-1"></i>Invalid username or password.
          </div>
          {% endif %}
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control form-control-lg" autofocus required>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="fas fa-sign-in-alt me-1"></i>Sign In
            </button>
          </form>
          <hr>
          <a href="/accounts/google/login/" class="btn w-100 d-flex align-items-center justify-content-center gap-2"
             style="border:1.5px solid var(--border);color:var(--navy-60);font-weight:600">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Continue with Google
          </a>
          <p class="text-center mt-3 mb-0 text-muted" style="font-size:.875rem">
            No account? <a href="{% url 'register' %}" class="fw-semibold">Register free</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
