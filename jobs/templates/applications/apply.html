{% extends 'base.html' %}
{% block title %}Apply — {{ job.title }}{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <a href="{% url 'job_detail' job.pk %}" class="btn btn-sm btn-outline-secondary mb-3">
        <i class="fas fa-arrow-left me-1"></i>Back to Job
      </a>
      <div class="card border-0 shadow">
        <div class="card-header">
          <h5 class="mb-0">Apply for: {{ job.title }}</h5>
          <small class="text-muted">{{ job.company }} · {{ job.location }}</small>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Select Resume <small class="text-muted">(optional)</small></label>
              <select name="resume" class="form-select">
                <option value="">— Apply without resume —</option>
                {% for resume in form.resume.field.queryset %}
                <option value="{{ resume.pk }}">{{ resume.title }}</option>
                {% endfor %}
              </select>
              <div class="form-text">
                <a href="{% url 'upload_resume' %}"><i class="fas fa-upload me-1"></i>Upload a new resume</a>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Cover Letter <small class="text-muted">(optional)</small></label>
              <textarea name="cover_letter" class="form-control" rows="6"
                        placeholder="Tell the employer why you're the perfect fit for this role..."></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-paper-plane me-1"></i>Submit Application
              </button>
              <a href="{% url 'job_detail' job.pk %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
