{% extends 'base.html' %}
{% block title %}{% if action == "Edit" %}Edit{% else %}Post{% endif %} Job — HireHub{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{% url 'employer_dashboard' %}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h3 class="section-title mb-0">
          {% if action == "Edit" %}Edit Job Listing{% else %}Post a New Job{% endif %}
        </h3>
      </div>
      <div class="card border-0 shadow">
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Job Title *</label>
                <input type="text" name="title" class="form-control" value="{{ form.title.value|default:'' }}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Company Name *</label>
                <input type="text" name="company" class="form-control" value="{{ form.company.value|default:'' }}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Location *</label>
                <input type="text" name="location" class="form-control" value="{{ form.location.value|default:'' }}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Salary (optional)</label>
                <input type="text" name="salary" class="form-control" placeholder="e.g. ₹5-8 LPA" value="{{ form.salary.value|default:'' }}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Job Type</label>
                <select name="job_type" class="form-select">
                  <option value="full_time">Full Time</option>
                  <option value="part_time">Part Time</option>
                  <option value="remote">Remote</option>
                  <option value="contract">Contract</option>
                  <option value="internship">Internship</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                  <option value="">— Select Category —</option>
                  {% for cat in form.category.field.queryset %}
                  <option value="{{ cat.pk }}" {% if form.category.value|stringformat:"s" == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                  <option value="open" {% if form.status.value == "open" %}selected{% endif %}>Open</option>
                  <option value="closed" {% if form.status.value == "closed" %}selected{% endif %}>Closed</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Job Description *</label>
                <textarea name="description" class="form-control" rows="6" required>{{ form.description.value|default:'' }}</textarea>
              </div>
              <div class="col-12">
                <label class="form-label">Requirements *</label>
                <textarea name="requirements" class="form-control" rows="5" required>{{ form.requirements.value|default:'' }}</textarea>
              </div>
            </div>
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save me-1"></i>
                {% if action == "Edit" %}Update Job{% else %}Publish Job{% endif %}
              </button>
              <a href="{% url 'employer_dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
